
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lefto - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= ROLE SELECTION ================= -->
<div id="role-selection">

  <h2>Select Your Role</h2>

  <button onclick="handleRoleSelection('provider', 'restaurant-form')">
    🍽️ Restaurant
  </button>

  <button onclick="handleRoleSelection('volunteer', 'volunteer-form')">
    🛵 Volunteer
  </button>

  <button onclick="handleRoleSelection('ngo', 'ngo-form')">
    🏢 NGO
  </button>

</div>


<!-- ================= RESTAURANT FORM ================= -->
<div id="restaurant-form" class="hidden">

  <h2>Restaurant Registration</h2>

  <form onsubmit="submitRestaurant(event)">
    <input type="text" placeholder="Restaurant Name" required>
    <input type="text" placeholder="Address" required>
    <input type="text" placeholder="Phone Number" required>
    <input type="file" accept="image/*" required>

    <button type="submit">Register</button>
  </form>

  <hr>

  <!-- ================= POST FOOD SECTION ================= -->
  <h3>Post Food</h3>

  <form onsubmit="postFood(event)">
    <input type="text" placeholder="Food Type (e.g. Pizza)" required>
    <input type="number" placeholder="Quantity" required>
    <input type="datetime-local" required>
    <input type="text" placeholder="Pickup Location" required>

    <button type="submit">Post Food</button>
  </form>

  <hr>

  <!-- ================= ACTIVE POSTS ================= -->
  <h3>Active Posts</h3>
  <div id="food-list"></div>

  <button onclick="showSelection()">⬅ Back</button>

</div>


<!-- ================= NGO FORM ================= -->
<div id="ngo-form" class="hidden">

  <h2>NGO Registration</h2>

  <form onsubmit="submitNGO(event)">
    <input type="text" placeholder="NGO Name" required>
    <input type="text" placeholder="Address" required>
    <input type="text" placeholder="Phone Number" required>
    <input type="file" accept="image/*" required>

    <button type="submit">Register</button>
  </form>

  <button onclick="showSelection()">⬅ Back</button>

</div>


<!-- ================= VOLUNTEER FORM ================= -->
<div id="volunteer-form" class="hidden">

  <h2>Volunteer Registration</h2>

  <form onsubmit="submitVolunteer(event)">
    <input type="text" placeholder="Name" required>
    <input type="text" placeholder="Phone Number" required>

    <input type="file" required> <!-- driver image -->
    <input type="file" required> <!-- license -->

    <input type="text" placeholder="Vehicle Type" required>
    <input type="number" placeholder="Capacity" required>

    <input type="file" required> <!-- vehicle image -->

    <button type="submit">Register</button>
  </form>

  <button onclick="showSelection()">⬅ Back</button>

</div>


<!-- ================= SCRIPT ================= -->
<script type="module" src="script.js"></script>

</body>
</html>
